server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for faster transfer
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Cache index.html for 1 day (86400 seconds)
    # The user will only hit the server once a day for the HTML skeleton
    location = /index.html {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Vite hashes assets (e.g. index-abc1234.js). These can be cached forever (1 year)
    # The browser will never hit the server again for these specific files
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Fallback for SPA routing and other files (cache for 1 day)
    location / {
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }
}
